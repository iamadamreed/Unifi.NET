name: Publish NuGet Package

on:
  push:
    branches:
      - main
      - alpha

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set Branch-Specific Variables
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/alpha" ]]; then
          echo "version_postfix=-alpha" >> $GITHUB_ENV
        else
          echo "version_postfix=" >> $GITHUB_ENV
        fi

    - name: Calculate Version
      run: |
        VERSION_PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
        VERSION="${VERSION_PREFIX}.${{ github.run_number }}${{ env.version_postfix }}"
        echo "version=$VERSION" >> $GITHUB_ENV
        echo "Package version: $VERSION"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.x'

    - name: Add GitHub NuGet Source
      run: |
        dotnet nuget add source \
          --username USERNAME \
          --password "${{ secrets.ACTIONS_TOKEN }}" \
          --store-password-in-clear-text \
          --name github \
          "https://nuget.pkg.github.com/Spire-Recovery-Solutions/index.json"

    - name: Restore and Build
      run: dotnet build --configuration Release

    - name: Pack
      run: |
        dotnet pack Unifi.NET.Access/Unifi.NET.Access.csproj \
          --configuration Release \
          --no-build \
          --output ./packages \
          /p:PackageVersion=${{ env.version }}

    - name: Push to GitHub Packages
      run: |
        dotnet nuget push ./packages/*.nupkg \
          --api-key "${{ secrets.ACTIONS_TOKEN }}" \
          --source github \
          --skip-duplicate
